services:
  db:
    image: mariadb:10.6
    container_name: ${COMPOSE_PROJECT_NAME:-nigma-wordpress}_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:php8.0-fpm
    container_name: ${COMPOSE_PROJECT_NAME:-nigma-wordpress}_wordpress
    restart: unless-stopped
    command: ["php-fpm"]
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MARIADB_DATABASE}
      WORDPRESS_DB_USER: ${MARIADB_USER}
      WORDPRESS_DB_PASSWORD: ${MARIADB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-ngm_}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-1}
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_ENVIRONMENT_TYPE', getenv( 'WP_ENVIRONMENT_TYPE' ) ?: 'local' );
        define( 'WP_HOME', getenv( 'WORDPRESS_HOME' ) ?: 'http://localhost:8080' );
        define( 'WP_SITEURL', getenv( 'WORDPRESS_SITEURL' ) ?: 'http://localhost:8080' );
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
        @ini_set( 'display_errors', 0 );
        define( 'DISALLOW_FILE_EDIT', true );
      WP_ENVIRONMENT_TYPE: ${WP_ENVIRONMENT_TYPE:-local}
      WORDPRESS_HOME: ${WORDPRESS_HOME:-http://localhost:8080}
      WORDPRESS_SITEURL: ${WORDPRESS_SITEURL:-http://localhost:8080}
    entrypoint: ["bash", "/usr/local/bin/nigma-wordpress-entrypoint.sh"]
    volumes:
      - wordpress_core:/var/www/html
      - ./wp-content/index.php:/var/www/html/wp-content/index.php:ro
      - ./wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./docker/wordpress/entrypoint.sh:/usr/local/bin/nigma-wordpress-entrypoint.sh:ro

  web:
    image: nginx:1.25-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-nigma-wordpress}_web
    restart: unless-stopped
    depends_on:
      - wordpress
    ports:
      - "${LOCAL_HTTP_PORT:-8080}:80"
    volumes:
      - wordpress_core:/var/www/html:ro
      - ./wp-content/index.php:/var/www/html/wp-content/index.php:ro
      - ./wp-content/plugins:/var/www/html/wp-content/plugins:ro
      - ./wp-content/themes:/var/www/html/wp-content/themes:ro
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
  wordpress_core:
