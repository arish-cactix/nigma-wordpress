server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    client_max_body_size 64m;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Proxy uploads to production — uploads/ is not version-controlled locally
    location ^~ /wp-content/uploads/ {
        try_files $uri @proxy_uploads;
        expires 7d;
        access_log off;
    }

    location @proxy_uploads {
        proxy_pass https://www.nigma.ae;
        proxy_set_header Host www.nigma.ae;
        proxy_ssl_server_name on;
        expires 7d;
        access_log off;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff2?|ttf|eot)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
